<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    New chat
                </button>
            </div>

            <div class="chat-history" id="chatHistory">
                <!-- Chat history items will be populated here -->
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>User</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="model-selector-wrapper">
                    <select id="modelSelect" class="model-select">
                        <option value="claude-opus-4-6">Claude Opus 4.6</option>
                        <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
                        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                    </select>
                    <i class="fas fa-chevron-down model-select-arrow"></i>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <h1>How can I help you?</h1>
                        <p>Powered by Claude</p>

                        <div class="example-prompts">
                            <div class="prompt-card" data-prompt="Explain quantum computing in simple terms">
                                <i class="fas fa-lightbulb"></i>
                                <span>Explain quantum computing in simple terms</span>
                            </div>
                            <div class="prompt-card" data-prompt="Write a creative story about a time traveler">
                                <i class="fas fa-pen"></i>
                                <span>Write a creative story about a time traveler</span>
                            </div>
                            <div class="prompt-card" data-prompt="Help me plan a healthy meal for the week">
                                <i class="fas fa-utensils"></i>
                                <span>Help me plan a healthy meal for the week</span>
                            </div>
                            <div class="prompt-card" data-prompt="Explain the basics of machine learning">
                                <i class="fas fa-robot"></i>
                                <span>Explain the basics of machine learning</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be populated here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        placeholder="Message Claude..."
                        rows="1"
                        maxlength="32000"
                    ></textarea>
                    <button class="send-button" id="sendButton" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-footer">
                    <small>Claude can make mistakes. Consider checking important information.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
